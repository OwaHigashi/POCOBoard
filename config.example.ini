# POCOBoard config — copy to config.ini next to pocoboard.py.
# Lines starting with # or ; are comments.

# ---- Network ----
http_host       = 0.0.0.0
http_port       = 8080

# ---- Audio / behaviour ----
startup_volume  = 80          ; 0..100 (loud but not clipped)
accept_on_boot  = true
debounce_ms     = 300

# ---- Display window ----
# Screen index (0-based) where the display window should open.
# -1 = pick the "other" screen (the one NOT holding the control window);
# falls back to screen 0 if only one monitor is present.
display_screen  = -1
# Start the display window fullscreen on boot.
display_fullscreen_on_boot = true
# Initial size of the display window if not fullscreen.
display_width   = 1600
display_height  = 900

# ---- Control window ----
# Screen index where the control window should open. -1 = primary.
control_screen  = -1

# ---- Media playback ----
# Default image display time, in seconds.  After this many seconds the
# uploaded image is auto-cleared from the background.  The operator can
# override this live from the control window (表示 tab).
#   0 = never auto-clear (image stays until 停止 is pressed)
image_display_sec = 180
# Minimum playback duration for videos and uploaded audio, in seconds.
# When the clip's natural length is SHORTER than this, playback loops
# (via setPosition + play on end-of-media) until the total elapsed time
# reaches this many seconds, then stops at the next natural end.  Clips
# longer than this play through once.
#   0 = play once, no looping (pre-2026-04-25 behavior for long clips)
media_min_play_sec = 60

# ---- Piano roll (USB MIDI) ----
# Speed at which note bars scroll upward in the piano-roll mode, in pixels
# per second.  Higher = bars travel up the screen faster (shorter visible
# trail per note).
piano_scroll_pps      = 110
# Opacity of FX scenes (CHEER / HEARTS / etc.) when stacked on top of the
# piano roll, expressed as a percentage.  0 hides FX entirely; 100 makes
# them fully opaque.  Default 55 keeps both layers comfortably readable.
piano_fx_opacity_pct  = 55

# ---- Marquee ----
# Font size in pixels (display-window pixels). Render is GPU-accelerated so
# you can go BIG on a 4K monitor.
marquee_size    = 64
# (Removed: marquee_ref_lanes / marquee_wait_per_empty — the PC version
#  has unlimited lanes + overlap, so the old ESP32-era throttle is not
#  needed.  Speed is now fixed pixels-per-second per speed-stop, not a
#  duration.)
